name: Apply Xcode fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply Xcode compile fix
        run: |
          unzip -oq GTA6Countdown-xcode-fix3-76e9011.zip -d .
          rm -f GTA6Countdown-xcode-fix3-76e9011.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: type image download task explicitly"
          git push origin HEAD:main
